# dev overlay — tracks main, auto-synced by the env ApplicationSet (§2.3).
# Image seam: dev follows the latest main build (promotion.yaml: dev=main digest).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: sample-dev
resources:
  - ../../base
  # sample-secret placeholder (demonstrates the secret path; APP_SECRET in base is
  # optional so a fresh repo with no secret still deploys — M4 zero-config).
  - sealedsecret.yaml
  - harbor-pull.sealedsecret.yaml   # image-pull cred for SA imagePullSecrets:[harbor-pull] (#C3)
  # capstone:secrets — The Process "Secrets" tab (capstone:seal-secret) appends
  # per-key SealedSecrets here as `- ../../secrets/<key>.sealedsecret.yaml` (M3,
  # ADR-029 §4.3). Keep this marker line last in resources: so the append is
  # deterministic; do not remove it.
# env-specific selector label (§3.1). semester comes from app-metadata via the
# tenant; set here for the workload's own label contract.
labels:
  - pairs:
      platform.capstone/env: dev
      platform.capstone/semester: 2026-fall
    includeSelectors: false
# Image-tag SEAM (§4.1): the CI image-bump (T8) rewrites newTag here.
images:
  - name: sample
    newName: harbor.capstone.uamishub.com/sample/sample
    newTag: 329c707
replicas:
  - name: sample
    count: 1
patches:
  - target:
      kind: Ingress
      name: sample
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: sample.sample.dev.capstone.uamishub.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: sample.sample.dev.capstone.uamishub.com
