# staging overlay — tracks release tags, auto-synced by the env ApplicationSet
# (§2.3). Image seam: staging follows the pushed semver tag (promotion.yaml:
# staging=tags/v*).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: sample-staging
resources:
  - ../../base
  - sealedsecret.yaml
labels:
  - pairs:
      platform.capstone/env: staging
      platform.capstone/semester: 2026-fall
    includeSelectors: false
images:
  - name: sample
    newName: harbor.capstone.uamishub.com/sample/sample
    # Bare semver (NO 'v' prefix) — matches what CI pushes: resolve-image.sh strips
    # the git tag's 'v' (refs/tags/v0.1.0 -> image tag 0.1.0). A v-prefixed newTag
    # here would reference an image CI never pushed -> ImagePullBackOff.
    newTag: 0.1.0
replicas:
  - name: sample
    count: 2
patches:
  - target:
      kind: Ingress
      name: sample
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: sample.sample.staging.capstone.uamishub.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: sample.sample.staging.capstone.uamishub.com
