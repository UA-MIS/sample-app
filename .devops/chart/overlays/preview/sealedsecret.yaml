# PLACEHOLDER SealedSecret for the Phase-1 preview stand-in namespace sample-pr-1
# (§5.3, D-006, D-009). Per-namespace strict scope: this seal is valid ONLY in
# namespace sample-pr-1. Without it the base Deployment's APP_SECRET secretKeyRef
# (Secret sample-secret) is unsatisfiable and preview pods never start (SEC-004).
#
# Regenerate with kubeseal against the live controller during T9 — see the
# "Secrets" section of .devops/README.md, including the dynamic-namespace wrinkle
# for the future live PR generator (preview namespaces are sample-pr-<n>, so a
# real seal is needed per preview namespace; flagged for Phase 2).
# Decrypts to Secret `sample-secret` (key app-secret) → Deployment APP_SECRET.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: sample-secret
  namespace: sample-pr-1
spec:
  encryptedData:
    app-secret: AgABCDEF_PLACEHOLDER_REPLACE_WITH_KUBESEAL_preview_pr1_xxxx==
  template:
    metadata:
      name: sample-secret
    type: Opaque
