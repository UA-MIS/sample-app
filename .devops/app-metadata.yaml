# app-metadata.yaml — the ONLY file a student declares values in (§1.2).
#
# These four fields are the single declarative input to the whole .devops/
# template: the chart/ overlays derive workload names, the ingress host
# (<app-name>.<team>.${PLATFORM_DOMAIN}), the namespace prefix (<team>-<env>),
# the cohort selector labels (platform.capstone/team + /semester), and the
# container port. The platform's tenant ApplicationSets read the same team +
# semester values. Everything else in .devops/ is platform-managed and immutable.
team: sample
semester: 2026-fall
app-name: sample
port: 8080
