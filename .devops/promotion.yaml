apiVersion: platform.capstone/v1
# promotion.yaml ‚Äî THE canonical single source of truth for the trigger‚Üíenv‚Üítag
# mapping (architecture ¬ß4.1, D-011/ADR-008). This file lives in the app repo and
# is read by BOTH consumers:
#   - the local CI seam (.devops/ci/build-and-push.sh + bump-image.sh), and
#   - the platform ApplicationSets, via an ArgoCD git-files generator pointed here.
# There is NO duplicate in the platform-infra tenant template ‚Äî both sides read
# THIS file, so the schema below is the shared contract.
#
# To change "tag‚Üístaging" into "merge-to-release-branch‚Üístaging", edit one entry
# here; nothing else changes. Reviewers/operators: look HERE first.

# Image registry ‚Äî the team's OWN Harbor project on the real cluster (Talos).
# Form: harbor.<PLATFORM_DOMAIN>/<team-project>; the CI build pushes
# <registry>/<app>:<tag> = harbor.capstone.uamishub.com/sample/sample:<tag>.
# (Phase-1 used the k3d built-in registry k3d-registry.localhost:5000 ‚Äî that host
# does NOT exist on the real cluster, so a build against it never deploys. The
# resolver logic is unchanged + unit-tested; only this value moves to Harbor.)
registry: harbor.capstone.uamishub.com/sample
app: sample

# Per-environment promotion rules. For each env:
#   trigger        ‚Äî the git event that promotes to this env (branch:main | tag:v* | pull_request)
#   tagConvention  ‚Äî the image-tag scheme build-and-push.sh computes:
#                      sha-<short>  -> registry/app:<short-git-sha>
#                      semver       -> registry/app:<X.Y.Z>   (provide SEMVER=)
#                      pull-<sha>   -> registry/app:pull-<short-git-sha>
#   overlay        ‚Äî repo-relative path to the kustomize overlay the bump rewrites
#   gate           ‚Äî auto | manual ; manual = no ArgoCD automated sync (the prod gate)
environments:
  dev:
    trigger: "branch:main"
    tagConvention: "sha-<short>"
    overlay: ".devops/chart/overlays/dev"
    gate: auto
  staging:
    trigger: "tag:v*"
    tagConvention: "semver"
    overlay: ".devops/chart/overlays/staging"
    gate: auto
  prod:
    trigger: "tag:v*"
    tagConvention: "semver"
    overlay: ".devops/chart/overlays/prod"
    gate: manual
  preview:
    trigger: "pull_request"
    tagConvention: "pull-<sha>"
    overlay: ".devops/chart/overlays/preview"
    gate: auto
