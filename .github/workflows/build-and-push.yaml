# ============================================================================
# build-and-push.yaml — the platform CI build+push workflow (P2.3, D-032).
#
# PLATFORM-MANAGED (.devops golden path). Every team gets this verbatim; it is
# part of the immutable .devops contract (CODEOWNERS /.devops/** + this file).
# Students do NOT edit it. The ONLY per-team values come from .devops/promotion.yaml
# (registry/app) and the git event — nothing here is hand-edited per team.
#
# WHAT IT DOES
#   - Builds the app image with KANIKO (rootless, no docker daemon/socket) on the
#     self-hosted ARC runners (runs-on: ua-mis-kaniko, containerMode:kubernetes,
#     non-root). Kaniko is the rootless builder the no-privileged runner model needs.
#   - Pushes to the team's OWN Harbor project: harbor.127-0-0-1.sslip.io/<name>/<app>
#     (per-team project keyed on the canonical <name> slug, D-026), using the
#     least-privilege PUSH robot secret `harbor-push` (pull+push on THIS project
#     only) consumed at /kaniko/.docker/config.json.
#   - Harbor scans the image on push (D-028) — we do NOT run Trivy here (no dup).
#
# THE TAG IS THE PROMOTION MECHANISM (D-030 prod-gate):
#   - push to main          -> :<short-sha>   (mutable; dev auto-syncs)
#   - push tag vX.Y.Z       -> :X.Y.Z         (IMMUTABLE; the prod image; one tag
#                                              names both image + manifest rev —
#                                              staging auto-syncs it, prod is the
#                                              manual gate, §4). No second tag.
#   - pull_request          -> BUILD ONLY (--no-push). PR code is untrusted; it is
#                              validated but never pushed to the registry.
#
# The trigger->env->tag mapping is computed by .devops/ci/resolve-image.sh, which
# reads promotion.yaml (the single source of truth, §4.1) and is unit-tested by
# .devops/ci/resolve-image.test.sh — the SAME resolver the local loop uses.
#
# CONTAINER-MODE SHAPE (why it's one job with a Kaniko *step*, not a Kaniko *job
# container*): the ARC runners are containerMode:kubernetes. The job runs on the
# normal runner pod (which has node+git, so actions/checkout works); the Kaniko
# build runs as a `uses: docker://` CONTAINER-ACTION STEP, which the
# runner-container-hooks execute in a SEPARATE pod from the Kaniko image, with the
# shared _work volume mounted — so the checked-out repo is Kaniko's local context.
# (Making Kaniko the job container would break the runner: its minimal image has
# no node/bash for the Actions runner internals.)
# ============================================================================
name: build-and-push

on:
  push:
    branches: [main]          # -> dev image (mutable sha tag), pushed
    tags: ["v*.*.*"]          # -> prod/staging image (immutable semver), pushed
  pull_request:               # -> build-only validation (untrusted code, no push)

# Least privilege for the workflow token. `contents: read` is all actions/checkout
# needs. The registry push is authenticated by the Harbor `harbor-push` robot —
# NOT GITHUB_TOKEN (no packages/registry scope is granted).
permissions:
  contents: read

# Don't pile up redundant builds for the same ref; cancel superseded runs.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ua-mis-kaniko
    # Expose the resolver's identity to the bump-dev job (consumed via
    # needs.build-and-push.outputs.*) so the DEPLOYED tag == the BUILT tag with no
    # recomputation/drift. TAG = the readable git-describe value (Deploy Model A).
    outputs:
      TAG: ${{ steps.resolve.outputs.TAG }}
      ENV: ${{ steps.resolve.outputs.ENV }}
      PUSH: ${{ steps.resolve.outputs.PUSH }}
    # REQUIRED by containerMode:kubernetes — every workflow job MUST declare a job
    # `container:` or the runner hard-fails at "Set up job" with "Jobs without a job
    # container are forbidden on this runner." (ARC k8s-mode: all workflows must use
    # job containers.) This small node image gives actions/checkout its node runtime
    # + a shell for the resolve step. It is NOT the Kaniko image — the Kaniko build
    # runs in its OWN job-step pod via the `uses: docker://` step below (shared _work
    # volume + the platform's harbor-push hook injection), so this container needs
    # neither Kaniko nor git. (Mirrors the platform backstage build, PR #60.)
    container:
      image: node:24-trixie-slim
    env:
      # Where the Harbor push cred lands inside the Kaniko step pod (Kaniko's
      # default DOCKER_CONFIG dir). The platform runner's container-hook template
      # injects secret `harbor-push` (dockerconfigjson) -> config.json here.
      # Decoupled from devops's mount wiring: only this value changes if the
      # platform ever mounts the dockerconfigjson at a different path.
      DOCKER_CONFIG_DIR: /kaniko/.docker
    steps:
      - name: Checkout (build context + promotion.yaml + resolver)
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 = full history + ALL TAGS. REQUIRED for resolve-image.sh's
          # `git describe --tags` (Deploy Model A readable dev tag, e.g.
          # v1.0.0-5-gabc123). The default depth=1 fetches NO tags → git describe
          # degrades to a bare sha (--always), defeating Model A. (context7-verified.)
          fetch-depth: 0

      - name: Resolve image identity from promotion.yaml
        id: resolve
        run: |
          sh .devops/ci/resolve-image.sh | tee -a "$GITHUB_OUTPUT"

      - name: Guard — push builds must have the Harbor cred mounted
        if: ${{ steps.resolve.outputs.PUSH == 'true' }}
        run: |
          # The cred lives in the Kaniko STEP pod, not this runner pod, so we
          # can't stat it here. This guard instead asserts the contract that the
          # platform MUST have wired the hook template; the real presence check
          # runs inside the Kaniko step (entrypoint wrapper below) and fails the
          # build rather than pushing unauthenticated. Kept as a visible marker.
          echo "push build for ${{ steps.resolve.outputs.IMAGE }} — Harbor cred" \
               "expected at ${DOCKER_CONFIG_DIR}/config.json in the Kaniko step pod"

      # --- Kaniko build as a container-action STEP (its own pod; shared _work) ---
      # `uses: docker://` runs the Kaniko image in a separate job-step pod with the
      # checked-out repo mounted. We override the entrypoint with a tiny sh wrapper
      # so we can (a) fail closed if a push build is missing its cred, and (b) build
      # vs. --no-push from the resolver's PUSH decision.
      - name: Build (and push) with Kaniko
        uses: docker://gcr.io/kaniko-project/executor:v1.23.2-debug
        with:
          entrypoint: /busybox/sh
          args: >-
            -c '
            set -eu;
            CFG="${DOCKER_CONFIG_DIR}/config.json";
            if [ "${PUSH}" = "true" ] && [ ! -s "$CFG" ]; then
              echo "ERROR: Harbor push credential not found at $CFG — the platform" \
                   "runner must inject secret harbor-push (container-hook template)." \
                   "Refusing an unauthenticated push." >&2;
              exit 1;
            fi;
            COMMON="--context=dir://${GITHUB_WORKSPACE}/app
                    --dockerfile=Dockerfile
                    --destination=${IMAGE}
                    --reproducible
                    --verbosity=info";
            if [ "${PUSH}" = "true" ]; then
              echo "==> building + pushing ${IMAGE}";
              /kaniko/executor $COMMON;
            else
              echo "==> PR build-only validation for ${IMAGE} (no push)";
              /kaniko/executor $COMMON --no-push --tar-path=/tmp/image.tar;
            fi
            '
        env:
          IMAGE: ${{ steps.resolve.outputs.IMAGE }}
          PUSH: ${{ steps.resolve.outputs.PUSH }}
          DOCKER_CONFIG_DIR: ${{ env.DOCKER_CONFIG_DIR }}

  # ============================================================================
  # bump-dev — the GitOps image-bump (D-030 automated promotion: push -> builds ->
  # DEPLOYS, hands-free). After build-and-push pushes the dev image, rewrite the
  # dev overlay's images[].newTag to the just-built tag and commit it to main;
  # ArgoCD sees the changed overlay and syncs the new image into <team>-dev.
  #
  # Deploy Model A: the tag is the BUILD job's resolver output (TAG) — a readable
  # `git describe --tags` value (e.g. v1.0.0-5-gabc123), NOT a bare SHA. We CONSUME
  # needs.build-and-push.outputs.TAG (no recomputation) so the DEPLOYED tag is
  # exactly the BUILT tag — zero drift.
  #
  # SECURITY (least privilege — SEPARATE job, NOT the build job):
  #   - `if:` restricts to a real push to main. NEVER runs on pull_request, so
  #     UNTRUSTED student PR code can't reach the write token.
  #   - job-scoped `permissions: contents: write` applies ONLY here; build-and-push
  #     keeps the workflow-default `contents: read`.
  #   - no pull_request_target; the only writer is post-merge trusted code.
  #   - loop guard: bump-image.sh's commit message carries `[skip ci]` → the bump
  #     commit does NOT re-trigger build-and-push (no infinite build loop).
  #
  # BRANCH PROTECTION + WRITE IDENTITY (Option A, D-030, sec-bumpjob #5):
  #   main requires PRs, so a plain GITHUB_TOKEN push is rejected. The bump push is
  #   authenticated by a GITHUB APP INSTALL TOKEN (NOT GITHUB_TOKEN, NOT a PAT) minted
  #   per-run by actions/create-github-app-token and SCOPED DOWN to contents:write
  #   ONLY (below the App's full install permissions — least privilege). The platform
  #   allowlists ONLY THAT APP (`ua-mis-backstage[bot]`) in main's "bypass pull
  #   request allowances" — not the broad github-actions[bot] — so only this scoped
  #   automation actor can push the overlay-tag commit to protected main.
  #
  #   Why an App install token, not GITHUB_TOKEN: GITHUB_TOKEN's actor is
  #   github-actions[bot]; allowlisting that bypasses PRs for ALL workflow writes
  #   (too broad for a verbatim every-tenant contract). A dedicated App actor keeps
  #   the bypass surface to exactly this one identity, and the token is contents:write
  #   only + expires in ~1h.
  #
  #   One-time repo/org-admin config at onboarding/go-live (NOT in this workflow):
  #     - org Actions VAR  CI_BUMP_APP_ID            = the App's App ID
  #     - org Actions SECRET CI_BUMP_APP_PRIVATE_KEY = the App's .pem
  #     - add `ua-mis-backstage[bot]` to main's bypass-pull-request-allowances
  #   For pre-existing sample-app: human does this once. Scaffolded tenants: the
  #   scaffolder automates it (co-designed with m4-dev). If the bypass/secret isn't
  #   configured, the run fails LOUD (set -e / token-mint error) — never a silent
  #   no-deploy.
  # ============================================================================
  bump-dev:
    needs: build-and-push
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build-and-push.outputs.PUSH == 'true' }}
    runs-on: ua-mis-kaniko
    container:
      image: node:24-trixie-slim
    # No `permissions: contents: write` here on purpose — the write is done by the
    # App install token below, NOT GITHUB_TOKEN. Keep GITHUB_TOKEN at read-only.
    permissions:
      contents: read
    steps:
      - name: Mint a contents:write-only App install token (least privilege)
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.CI_BUMP_APP_ID }}
          private-key: ${{ secrets.CI_BUMP_APP_PRIVATE_KEY }}
          # Scope the minted token DOWN to contents:write on THIS repo only —
          # narrower than the App's full install perms (Administration/Workflows/PRs).
          permission-contents: write

      - name: Checkout main (writable via App token; full history for a clean base)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          # Use the scoped App install token (the bypass-allowlisted actor), NOT the
          # default GITHUB_TOKEN — that's what authorizes the push to protected main.
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Bump dev overlay newTag -> built git-describe tag + commit + push
        env:
          TAG: ${{ needs.build-and-push.outputs.TAG }}
          GIT_AUTHOR_NAME: ua-mis-ci
          GIT_AUTHOR_EMAIL: ci@capstone.uamishub.com
          GIT_COMMITTER_NAME: ua-mis-ci
          GIT_COMMITTER_EMAIL: ci@capstone.uamishub.com
        run: |
          set -eu
          # CONSUME the build job's resolver TAG (readable git-describe; no recompute).
          # bump-image.sh (COMMIT=1) rewrites the dev overlay newTag + git-commits with
          # a "[skip ci]" message (so this push does NOT re-trigger build-and-push).
          COMMIT=1 sh .devops/ci/bump-image.sh dev "${TAG}"
          git push origin HEAD:main
